name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias del sistema (solo Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar pnpm
        run: npm install -g pnpm@11

      - name: Instalar Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Caché de Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Instalar dependencias del frontend
        run: pnpm install

      - name: Compilar y publicar release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Play Ondas app ${{ github.ref_name }}'
          releaseBody: |
            ## Play Ondas app — Primera versión pública

            Reproductor de audio binaural de escritorio, diseñado con la estética **Aire**.

            ### ¿Qué incluye esta versión?

            **Reproducción de audio binaural**
            - 5 tipos de onda: Gamma, Beta, Alfa, Theta · Delta y Ruido Marrón
            - Controles de transporte: Play, Pausa, Stop y bucle continuo
            - Control de volumen con silencio rápido
            - Visualizador de forma de onda animado que refleja el estado de reproducción

            **Personalización**
            - Tema claro, oscuro o automático (sincronizado con el sistema)
            - Sustituye el audio de cualquier onda por un fichero propio (MP3, WAV, OGG, FLAC)
            - Atajos de teclado globales configurables — funcionan aunque la app esté minimizada en la bandeja:
              - `Ctrl+Shift+P` — Reproducir / Pausar
              - `Ctrl+Shift+X` — Pausar
              - `Ctrl+Shift+S` — Detener

            **Integración con el sistema**
            - Icono en la bandeja del sistema (systray) con menú de control rápido
            - Opción de minimizar a la bandeja al cerrar
            - Opción de iniciar minimizado
            - Persistencia de posición y tamaño de ventana entre sesiones

            **Primer arranque**
            - Descarga automática de los audios de acompañamiento (~45 MB) con barra de progreso
            - Configuración almacenada localmente; sin cuenta, sin telemetría

            ---

            ## Descargar

            | Plataforma | Archivo |
            |------------|---------|
            | Windows 10/11 (x64) | `play-ondas-app_1.0.0_x64_en-US.msi` |
            | Linux x64 | `play-ondas-app_1.0.0_amd64.AppImage` |

            > **Windows:** ejecuta el `.msi` y sigue el asistente de instalación.

            > **Linux:** descarga el AppImage, dale permisos de ejecución y ábrelo:
            > ```bash
            > chmod +x play-ondas-app_*.AppImage
            > ./play-ondas-app_*.AppImage
            > ```
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
