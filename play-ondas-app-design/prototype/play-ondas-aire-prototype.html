document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

02Fsc-if>\n            <span style=\"width:14px;height:14px;border-radius:50%;background: {{ w.color }};flex-shrink:0;\"><\u002Fspan>\n            <div style=\"flex:1;min-width:0;\">\n              <div style=\"font-weight:600;font-size:14px;\">{{ w.name }}<\u002Fdiv>\n              <div style=\"font-family:'Space Mono',monospace;font-size:11px;color: {{ c.mut }};\">{{ w.hz }}<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ w.isSel }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:9.5px;font-family:'Space Mono',monospace;color: {{ c.accent }};letter-spacing:0.06em;\">{{ liveTag }}<\u002Fspan><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"margin-top:auto;font-size:10.5px;line-height:1.45;color: {{ c.faint }};padding:10px;\">{{ disclaimer }}<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- detail -->\n      <div style=\"flex:1;display:flex;flex-direction:column;padding:30px 36px;\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;\">\n          <div>\n            <div style=\"display:flex;align-items:center;gap:13px;\">\n              <span style=\"width:16px;height:16px;border-radius:50%;background: {{ cur.color }};\"><\u002Fspan>\n              <h2 style=\"margin:0;font-size:32px;font-weight:700;letter-spacing:-0.02em;white-space:nowrap;\">{{ cur.name }}<\u002Fh2>\n              <span style=\"font-family:'Space Mono',monospace;font-size:13px;color: {{ c.mut }};align-self:flex-end;padding-bottom:6px;\">{{ cur.hz }}<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"margin:16px 0 0;max-width:430px;font-size:15px;line-height:1.55;color: {{ c.ink2 }};\">{{ cur.short }}<\u002Fp>\n            <p style=\"margin:11px 0 0;font-size:13.5px;color: {{ c.mut }};\"><span style=\"color: {{ c.accent }};font-weight:600;\">Uso · <\u002Fspan>{{ cur.use }}<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"text-align:right;flex-shrink:0;\">\n            <div style=\"fon p:2px;height:24px;color: {{ cur.color }};overflow:hidden;\">\n        <sc-for list=\"{{ bars }}\" as=\"bar\" hint-placeholder-count=\"38\"><span style=\"width:3px;height: {{ bar.h }}px;background:currentColor;border-radius:2px;transform-origin:center;animation: {{ bar.anim }};\"><\u002Fspan><\u002Fsc-for>\n      <\u002Fdiv>\n      <button onclick=\"{{ closeMini }}\" title=\"Restaurar\" style=\"width:30px;height:30px;border-radius:8px;border:1px solid {{ c.btnBorder }};background:transparent;color: {{ c.mut }};cursor:pointer;flex-shrink:0;font-size:13px;\">⤢<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ ERROR TOAST ============ -->\n  <sc-if value=\"{{ error }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;left:50%;top:62px;transform:translateX(-50%);display:flex;align-items:center;gap:12px;background:#B4472E;color:#FBEFE9;padding:12px 16px;border-radius:12px;box-shadow:0 14px 34px -8px rgba(120,40,20,0.5);max-width:520px;\">\n      <span style=\"width:22px;height:22px;border-radius:50%;border:2px solid #FBEFE9;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;\">!<\u002Fspan>\n      <div style=\"font-size:13px;line-height:1.4;\"><b>No se pudo reproducir el audio.<\u002Fb> Comprueba el archivo o restaura el predeterminado.<\u002Fdiv>\n      <button onclick=\"{{ hideError }}\" style=\"background:transparent;border:none;color:#FBEFE9;cursor:pointer;font-size:16px;line-height:1;\">×<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ TRAY MENU ============ -->\n  <sc-if value=\"{{ tray }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;right:16px;bottom:16px;width:212px;background: {{ c.surface }};border:1px solid {{ c.border }};border-radius:12px;padding:6px;box-shadow:0 18px 44px -10px rgba(0,0,0,0.45);\">\n      <div style=\"padding:8px 12px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color: {{ c.faint }};\">Play Ondas app<\u002Fdiv>\n      <div style=\"padding:9px 12px;border-radius:8px;font-size:13px;color: {{ c.ink2 }};\">Mostrar / ocultar ventana<\u002Fdiv>\n      <div style=\"padding:9px 12px;border-radius:8px;font-size:13px;color: {{ c.ink2 }};\">Play / Pausa<\u002Fdiv>\n      <div style=\"padding:9px 12px;border-radius:8px;font-size:13px;color: {{ c.ink2 }};\">Detener<\u002Fdiv>\n      <div style=\"height:1px;background: {{ c.border }};margin:5px 8px;\"><\u002Fdiv>\n      <div style=\"padding:9px 12px;border-radius:8px;font-size:13px;color:#B4472E;\">Salir<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ CLOSE-TO-TRAY DIALOG ============ -->\n  <sc-if value=\"{{ closeDlg }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;inset:0;background:rgba(20,16,10,0.42);display:flex;align-items:center;justify-content:center;\">\n      <div style=\"width:420px;background: {{ c.surface }};border:1px solid {{ c.border }};border-radius:18px;padding:24px;box-shadow:0 24px 60px -12px rgba(0,0,0,0.4);\">\n        <h3 style=\"margin:0;font-size:17px;font-weight:700;\">La app sigue sonando en segundo plano<\u002Fh3>\n        <p style=\"margin:12px 0 0;font-size:13.5px;line-height:1.5;color: {{ c.ink2 }};\">Al cerrar la ventana, Play Ondas se minimiza a la bandeja del sistema y la reproducción continúa. Para cerrarla del todo, usa «Salir» desde el menú de la bandeja.<\u002Fp>\n        <label style=\"display:flex;align-items:center;gap:9px;margin-top:16px;font-size:13px;color: {{ c.mut }};\"><span style=\"width:18px;height:18px;border-radius:5px;border:1.5px solid {{ c.btnBorder }};\"><\u002Fspan>No volver a mostrar este aviso<\u002Flabel>\n        <div style=\"display:flex;justify-content:flex-end;gap:10px;margin-top:18px;\">\n          <button onclick=\"{{ closeCloseDlg }}\" style=\"padding:9px 16px;border-radius:10px;border:1px solid {{ c.btnBorder }};background:transparent;color: {{ c.ink2 }};cursor:pointer;font-size:13px;font-family:inherit;\">Salir del todo<\u002Fbutton>\n          <button onclick=\"{{ closeCloseDlg }}\" style=\"padding:9px 18px;border-radius:10px;border:none;background: {{ c.accent }};color: {{ c.accentText }};cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;\">Minimizar a bandeja<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:900,&quot;height&quot;:620}}\">\nclass Component extends DCLogic {\n  state = { theme:'light', screen:'main', sel:'beta', playing:true, vol:62, modal:false, mini:false, error:false, tray:false, closeDlg:false, noAudio:false };\n\n  componentDidMount() {\n    // Prototype-only hook so screenshots / reviewers can drive any state.\n    window.__po = (patch) => this.setState(patch);\n  }\n\n  renderVals() {\n    const L = { bg:'#F6F1E8', surface:'#FCF9F3', listBg:'#FAF6EF', border:'#E7DECF', line:'#F0E9DC', ink:'#2C2620', ink2:'#5F574B', mut:'#8A7F70', faint:'#A2917A', accent:'#C77D3A', accentText:'#FFFFFF', track:'#E7DECF', btnBorder:'#DCD2C1', knob:'#FFFFFF', dot:'#E2D8C6' };\n    const D = { bg:'#1C1916', surface:'#221E19', listBg:'#211D18', border:'#332E27', line:'#2F2A24', ink:'#F1EADE', ink2:'#C4BAA9', mut:'#9C917F', faint:'#8C8170', accent:'#E0A45C', accentText:'#1C1916', track:'#332E27', btnBorder:'#3F392F', knob:'#F1EADE', dot:'#3A342C' };\n    const c = this.state.theme === 'dark' ? D : L;\n\n    const base = [\n      {id:'gamma',name:'Gamma',hz:'30–100 Hz',color:'#D98A2B',shadow:'rgba(217,138,43,0.55)',short:'Las ondas gamma suelen asociarse con alta actividad cognitiva e integración de información.',use:'Estudio exigente, lectura técnica, atención sostenida.',audio:'default.mp3',custom:false,stateLabel:'Predeterminado'},\n      {id:'beta',name:'Beta',hz:'13–30 Hz',color:'#CB6A4A',shadow:'rgba(203,106,74,0.55)',short:'Las ondas beta se relacionan con estados de alerta y concentración activa orientada a tareas.',use:'Trabajo, programación, escritura y estudio.',audio:'mi-foco.mp3',custom:true,stateLabel:'Personalizado'},\n      {id:'alfa',name:'Alfa',hz:'8–12 Hz',color:'#8C9A56',shadow:'rgba(140,154,86,0.5)',short:'Las ondas alfa suelen asociarse con relajación despierta, calma y atención suave.',use:'Lectura ligera, organizar ideas, calma.',audio:'default.mp3',custom:false,stateLabel:'Predeterminado'},\n      {id:'theta',name:'Theta / Delta',hz:'< 8 Hz',color:'#6E6CA8',shadow:'rgba(110,108,168,0.55)',short:'Theta y delta se asocian con relajación profunda, meditación y descanso.',use:'Desconexión, preparación para dormir.',audio:'default.mp3',custom:false,stateLabel:'Predeterminado'},\n      {id:'brown',name:'Ruido marrón',hz:'—',color:'#9A6B45',shadow:'rgba(154,107,69,0.5)',short:'Sonido grave y estable, parecido a una cascada lejana, que enmascara ruidos externos.',use:'Concentración, reducir distracciones.',audio:'rio.wav',custom:true,stateLabel:'Personalizado'}\n    ];\n    const sel = this.state.sel;\n    const playing = this.state.playing;\n    const selectWave = (id) => this.setState({ sel:id, error:false });\n    const openModalFor = (id) => this.setState({ modal:true, sel:id });\n    const listWaves = base.map(w => ({ ...w, isSel:w.id===sel, rowBg: w.id===sel ? c.line : 'transparent', onSelect:()=>selectWave(w.id), onReplace:()=>openModalFor(w.id) }));\n    const cur = base.find(w => w.id===sel) || base[0];\n\n    const bars = Array.from({length:38}, (_,i) => {\n      const h = 14 + Math.round(48 * Math.abs(Math.sin(i*0.55 + 0.6)));\n      const delay = (i*47)%1500, dur = 820+((i*53)%560);\n      return { h, anim: playing ? ('waveBar '+dur+'ms ease-in-out '+delay+'ms infinite') : 'none' };\n    });\n\n    const segBase = 'padding:6px 14px;border-radius:7px;';\n    const segOn = segBase + 'background:'+c.accent+';color:'+c.accentText+';font-weight:600;';\n    const segOff = segBase + 'color:'+c.mut+';';\n    const volTrack = 'linear-gradient(90deg, '+c.accent+' '+this.state.vol+'%, '+c.track+' '+this.state.vol+'%)';\n\n    return {\n      c, listWaves, waves:base, cur, bars,\n      playing, paused: !playing,\n      vol:this.state.vol, volLabel:this.state.vol+'%', volTrack,\n      isMain:this.state.screen==='main', isSettings:this.state.screen==='settings',\n      modal:this.state.modal, mini:this.state.mini, error:this.state.error, tray:this.state.tray, closeDlg:this.state.closeDlg,\n      noAudio:this.state.noAudio, hasAudio: !this.state.noAudio,\n      statusLabel: playing ? 'Reproduciendo' : 'Pausado',\n      liveTag: playing ? '● LIVE' : '❙❙ PAUSA',\n      segAuto:segOff, segLight:(this.state.theme==='light'?segOn:segOff), segDark:(this.state.theme==='dark'?segOn:segOff),\n      disclaimer:'Sonidos ambientales que algunas personas encuentran útiles para concentración o descanso. Sus efectos varían. No diagnostica ni trata ninguna condición.',\n      goSettings:()=>this.setState({screen:'settings'}),\n      goMain:()=>this.setState({screen:'main'}),\n      togglePlay:()=>this.setState(s=>({playing:!s.playing})),\n      stop:()=>this.setState({playing:false}),\n      setLight:()=>this.setState({theme:'light'}),\n      setDark:()=>this.setState({theme:'dark'}),\n      openModal:()=>this.setState({modal:true}),\n      closeModal:()=>this.setState({modal:false}),\n      openMini:()=>this.setState({mini:true}),\n      closeMini:()=>this.setState({mini:false}),\n      hideError:()=>this.setState({error:false}),\n      closeCloseDlg:()=>this.setState({closeDlg:false}),\n      onVol:(e)=>this.setState({vol:Number(e.target.value)})\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
